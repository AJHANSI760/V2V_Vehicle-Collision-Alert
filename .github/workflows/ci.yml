name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check backend syntax
        run: python -m py_compile app.py

      - name: Check required frontend files
        run: |
          test -f index.html
          test -f public.html
          test -f login.html
          test -f dashboard.html
          test -f settings.html
          test -f styles.css
